name: Azure Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: voiceagent.azurecr.io
  IMAGE_AGENT: agent-controller
  IMAGE_STT: stt-service
  IMAGE_TTS: tts-service

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Lint + Test
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]" || true

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ || true

      - name: Run zero-dependency tests
        run: |
          python tests/test_runner.py
          python tests/test_receptionist_tools.py

  # ---------------------------------------------------------------------------
  # Phase 2: Build + Push Containers
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_AGENT }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_STT }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_TTS }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch

      - name: Build and push Agent Controller
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.agent
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_AGENT }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push STT Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.stt
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_STT }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push TTS Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.tts
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_TTS }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Phase 3: Deploy to Development
  # ---------------------------------------------------------------------------
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://voice-dev.acme-medical.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-voice-dev
          cluster-name: aks-voice-dev

      - name: Deploy to Dev
        run: |
          kubectl apply -k k8s/overlays/dev/
          kubectl set image deployment/dev-agent-controller agent-controller=${{ env.REGISTRY }}/${{ env.IMAGE_AGENT }}:${{ github.sha }} -n voice-agent-dev
          kubectl set image deployment/dev-stt-service stt-service=${{ env.REGISTRY }}/${{ env.IMAGE_STT }}:${{ github.sha }} -n voice-agent-dev
          kubectl set image deployment/dev-tts-service tts-service=${{ env.REGISTRY }}/${{ env.IMAGE_TTS }}:${{ github.sha }} -n voice-agent-dev
          kubectl rollout status deployment/dev-agent-controller -n voice-agent-dev --timeout=300s

  # ---------------------------------------------------------------------------
  # Phase 4: Deploy to Production (manual gate)
  # ---------------------------------------------------------------------------
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://voice.acme-medical.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-voice-prod
          cluster-name: aks-voice-prod

      - name: Deploy to Production
        run: |
          kubectl apply -k k8s/overlays/prod/
          kubectl set image deployment/prod-agent-controller agent-controller=${{ env.REGISTRY }}/${{ env.IMAGE_AGENT }}:${{ github.sha }} -n voice-agent
          kubectl set image deployment/prod-stt-service stt-service=${{ env.REGISTRY }}/${{ env.IMAGE_STT }}:${{ github.sha }} -n voice-agent
          kubectl set image deployment/prod-tts-service tts-service=${{ env.REGISTRY }}/${{ env.IMAGE_TTS }}:${{ github.sha }} -n voice-agent
          kubectl rollout status deployment/prod-agent-controller -n voice-agent --timeout=600s
