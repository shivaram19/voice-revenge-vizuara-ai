apiVersion: v1
kind: Service
metadata:
  name: webrtc-asr
  namespace: voice-agent
  labels:
    app: webrtc-asr
spec:
  type: ClusterIP
  selector:
    app: webrtc-asr
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
