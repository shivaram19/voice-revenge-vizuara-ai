apiVersion: v1
kind: Service
metadata:
  name: stt-service
  namespace: voice-agent
  labels:
    app: stt-service
spec:
  type: ClusterIP
  selector:
    app: stt-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
